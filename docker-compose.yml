services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wedplan
      POSTGRES_USER: wedplan
      POSTGRES_PASSWORD: wedplan_local
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedplan -d wedplan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
