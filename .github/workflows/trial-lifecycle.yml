name: Trial Lifecycle

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Check lifecycle configuration
        id: config
        run: |
          if [ -z "$PRODUCTION_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::notice::Trial lifecycle skipped because PRODUCTION_BASE_URL and/or CRON_SECRET is not configured."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Expire trials
        if: steps.config.outputs.enabled == 'true'
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${PRODUCTION_BASE_URL}/api/internal/cron/trials/expire"

      - name: Move expired trials to grace
        if: steps.config.outputs.enabled == 'true'
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${PRODUCTION_BASE_URL}/api/internal/cron/trials/grace"

      - name: Suspend grace-expired weddings
        if: steps.config.outputs.enabled == 'true'
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${PRODUCTION_BASE_URL}/api/internal/cron/trials/cleanup"
